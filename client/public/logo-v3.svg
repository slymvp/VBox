<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 150" width="520" height="150">
  <defs>
    <linearGradient id="gV" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="gO" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/><stop offset="50%" stop-color="#22c55e"/><stop offset="100%" stop-color="#84cc16"/>
    </linearGradient>
    <linearGradient id="gX" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#6366f1" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowPlay" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#22c55e" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- ===== V — 锐利蓝紫色，顶部稍宽 ===== -->
  <g filter="url(#shadow)">
    <path d="M 8,16 L 43,112 L 63,112 L 98,16" fill="none" stroke="url(#gV)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ===== B — 圆润青蓝色 ===== -->
  <g filter="url(#shadow)">
    <!-- 左竖 + 两个圆弧 -->
    <path d="
      M 115,16 L 115,112
      M 115,16 L 162,16 Q 192,16 192,44 Q 192,66 170,68
      Q 192,70 192,96 Q 192,112 162,112 L 115,112
    " fill="none" stroke="url(#gB)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ===== O — 绿色环 + 白色播放三角 ===== -->
  <g filter="url(#shadow)">
    <circle cx="295" cy="64" r="48" fill="none" stroke="url(#gO)" stroke-width="18"/>
  </g>
  <g filter="url(#shadowPlay)">
    <!-- 播放三角稍微偏右实现视觉平衡 -->
    <polygon points="282,40 282,88 322,64" fill="#ffffff"/>
  </g>

  <!-- ===== X — 橙红动感交错 ===== -->
  <g filter="url(#shadow)">
    <path d="M 380,16 L 435,112 M 435,16 L 380,112" fill="none" stroke="url(#gX)" stroke-width="20" stroke-linecap="round"/>
  </g>

  <!-- 底部细装饰线 -->
  <line x1="8" y1="138" x2="480" y2="138" stroke="url(#gV)" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
</svg>
