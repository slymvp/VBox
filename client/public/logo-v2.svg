<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 150" width="520" height="150">
  <defs>
    <!-- 5色流光渐变 -->
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6366f1"/>
      <stop offset="25%"  stop-color="#3b82f6"/>
      <stop offset="50%"  stop-color="#06b6d4"/>
      <stop offset="75%"  stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <!-- O 单独渐变 -->
    <linearGradient id="gradO2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#06b6d4"/>
      <stop offset="50%"  stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#a3e635"/>
    </linearGradient>
    <!-- 描边渐变 -->
    <linearGradient id="strokeFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="33%"  stop-color="#06b6d4"/>
      <stop offset="66%"  stop-color="#10b981"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#6366f1" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- ===== V: 锐利斜切变形 ===== -->
  <g filter="url(#softShadow)">
    <path d="
      M 8,12
      L 42,118 L 60,118
      L 92,12
      L 72,12
      L 50,78
      L 28,12 Z
    " fill="url(#strokeFlow)"/>
  </g>

  <!-- ===== B: 圆润时尚体 ===== -->
  <g filter="url(#softShadow)">
    <path d="
      M 108,12 L 108,118
      M 108,12 L 158,12
      Q 188,12 188,42
      Q 188,62 166,64
      Q 186,66 186,92
      Q 186,118 158,118 L 108,118
    " fill="none" stroke="url(#strokeFlow)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ===== O + Play: 核心标志 ===== -->
  <g filter="url(#softShadow)">
    <!-- 外圈 -->
    <circle cx="288" cy="65" r="53" fill="none" stroke="url(#gradO2)" stroke-width="16"/>
    <!-- 播放三角，稍偏右实现视觉平衡 -->
    <polygon points="274,40 274,90 316,65" fill="#ffffff" filter="url(#glow)"/>
  </g>

  <!-- ===== X: 动感交错 ===== -->
  <g filter="url(#softShadow)">
    <path d="
      M 376,12 L 434,118
      M 434,12 L 376,118
    " fill="none" stroke="url(#strokeFlow)" stroke-width="19" stroke-linecap="round"/>
  </g>

  <!-- 底部装饰线 -->
  <line x1="8" y1="136" x2="484" y2="136" stroke="url(#strokeFlow)" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
</svg>
