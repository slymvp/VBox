<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240">
  <defs>
    <!-- V -- 紫到蓝 -->
    <linearGradient id="gV" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <!-- B -- 蓝到青 -->
    <linearGradient id="gB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <!-- O -- 青到绿 -->
    <linearGradient id="gO" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <!-- X -- 橙到红 -->
    <linearGradient id="gX" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <rect width="800" height="240" fill="#0a0a0f"/>

  <!-- V — 粗几何三角形 -->
  <polygon points="12,0 60,0 88,200 44,200" fill="url(#gV)"/>

  <!-- B — 竖杆 + 两个几何圆弧 (上弧 & 下弧) -->
  <rect x="100" y="0" width="28" height="200" rx="6" fill="url(#gB)"/>
  <!-- B 上弧 -->
  <rect x="126" y="0" width="68" height="96" rx="44" fill="url(#gB)"/>
  <rect x="144" y="13" width="40" height="72" rx="24" fill="#0a0a0f"/>
  <!-- B 下弧 -->
  <rect x="126" y="104" width="68" height="96" rx="44" fill="url(#gB)"/>
  <rect x="144" y="117" width="40" height="70" rx="24" fill="#0a0a0f"/>

  <!-- O — 与 B 右侧弧线咬合，环+三角 -->
  <rect x="204" y="0" width="68" height="200" rx="44" fill="url(#gO)"/>
  <rect x="224" y="20" width="28" height="160" rx="20" fill="#0a0a0f"/>
  <!-- 白色播放三角 -->
  <polygon points="232,72 232,168 268,120" fill="#ffffff"/>

  <!-- X — 两条粗斜杆与 O 下半部融合，右侧臂更长 -->
  <!-- X 左上到右下 -->
  <polygon points="314,0 340,0 400,120 374,120" fill="url(#gX)"/>
  <!-- X 右上到左下 -->
  <polygon points="402,0 428,0 370,200 344,200" fill="url(#gX)"/>

  <!-- 底部彩色细线 -->
  <rect x="12" y="216" width="776" height="4" rx="2" fill="url(#gV)"/>
</svg>
