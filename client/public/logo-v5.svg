<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&amp;display=swap');
      .logo-text {
        font-family: 'Montserrat', 'Helvetica Neue', 'Arial Black', sans-serif;
        font-weight: 900;
        font-size: 72px;
      }
    </style>
    <linearGradient id="gV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="gB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="gO" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="gX" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="gLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="25%" stop-color="#0ea5e9"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="75%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="gPlayBorder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="gPlayFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- V -->
  <text x="38" y="108" class="logo-text" fill="url(#gV)">V</text>

  <!-- B -->
  <text x="138" y="108" class="logo-text" fill="url(#gB)">B</text>

  <!-- O — hollow ring with play triangle -->
  <circle cx="260" cy="68" r="40" fill="none" stroke="url(#gPlayBorder)" stroke-width="10"/>
  <polygon points="250,48 250,88 285,68" fill="url(#gPlayFill)"/>

  <!-- X -->
  <text x="328" y="108" class="logo-text" fill="url(#gX)">X</text>

  <!-- Underline -->
  <rect x="30" y="152" width="448" height="3" rx="1.5" fill="url(#gLine)"/>
</svg>
