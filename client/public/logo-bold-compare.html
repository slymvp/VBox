<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VBOX Logo 大胆变形方案</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #fff; font-family: system-ui, sans-serif; padding: 32px; min-height: 100vh; }
  h1 { text-align: center; font-size: 26px; margin-bottom: 6px; color: #e0e0e0; }
  .sub { text-align: center; font-size: 13px; color: #555; margin-bottom: 36px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; max-width: 1100px; margin: 0 auto; }
  .card { background: #12121a; border-radius: 14px; overflow: hidden; border: 1px solid #222; transition: 0.2s; }
  .card:hover { border-color: #6366f1; }
  .card-header { padding: 14px 18px; border-bottom: 1px solid #1c1c24; }
  .card-num { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
  .card-title { font-size: 17px; font-weight: 700; margin-top: 4px; }
  .card-desc { font-size: 13px; color: #666; margin-top: 2px; }
  .card-img { padding: 12px; display: flex; justify-content: center; background: #0a0a0f; }
  .card-img img { max-width: 100%; max-height: 380px; border-radius: 4px; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-right: 4px; margin-top: 6px; }
  .tag-purple { background: #7c3aed20; color: #a78bfa; }
  .tag-blue { background: #2563eb20; color: #60a5fa; }
  .tag-cyan { background: #0891b220; color: #22d3ee; }
  .files { margin-top: 28px; padding: 16px 20px; background: #12121a; border-radius: 12px; max-width: 600px; margin-left: auto; margin-right: auto; border: 1px solid #1c1c24; }
  .files h3 { font-size: 13px; color: #555; margin-bottom: 10px; }
  .file-item { padding: 6px 10px; background: #0a0a0f; border-radius: 5px; margin-bottom: 4px; font-size: 12px; font-family: monospace; color: #777; }
</style>
</head>
<body>
<h1>VBOX Logo · 大胆变形方案</h1>
<p class="sub">字母紧凑 · 定制字体 · 充满设计感</p>

<div class="grid">
  <div class="card">
    <div class="card-header">
      <div class="card-num">方案 A</div>
      <div class="card-title">几何先锋 · 字母咬合</div>
      <div class="card-desc">V 锐角穿插、B 长弧延展、O 大号三角、X 动态斜切</div>
      <span class="tag tag-purple">V 紫</span><span class="tag tag-blue">B 蓝</span><span class="tag tag-cyan">O 青</span>
    </div>
    <div class="card-img">
      <img src="Bold_avant_garde_logo_design_f_2026-06-13T10-24-15.png" alt="方案A">
    </div>
  </div>
  <div class="card">
    <div class="card-header">
      <div class="card-num">方案 B</div>
      <div class="card-title">霓虹铬色 · 交错融合</div>
      <div class="card-desc">V 切邻字、B 夸张弧廓、O 发光三角焦点、X 不对称长短臂</div>
      <span class="tag tag-purple">V 品红</span><span class="tag tag-blue">B 电蓝</span><span class="tag tag-cyan">O 霓虹青</span>
    </div>
    <div class="card-img">
      <img src="Ultra_compact_creative_logo_fo_2026-06-13T10-24-43.png" alt="方案B">
    </div>
  </div>
</div>

<div class="files">
  <h3>源文件</h3>
  <div class="file-item">Bold_avant_garde_logo_design_f_2026-06-13T10-24-15.png</div>
  <div class="file-item">Ultra_compact_creative_logo_fo_2026-06-13T10-24-43.png</div>
</div>

</body>
</html>
