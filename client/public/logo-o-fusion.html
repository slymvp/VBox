<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VBOX O 融合方案</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #fff; font-family: system-ui, sans-serif; padding: 28px; min-height: 100vh; }
  h1 { text-align: center; font-size: 24px; margin-bottom: 6px; }
  .sub { text-align: center; font-size: 13px; color: #555; margin-bottom: 30px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 16px; max-width: 1000px; margin: 0 auto; }
  .card { background: #111119; border-radius: 12px; overflow: hidden; border: 1px solid #1e1e28; }
  .card-header { padding: 12px 16px; border-bottom: 1px solid #191924; }
  .card-num { font-size: 11px; color: #4b5563; text-transform: uppercase; letter-spacing: 1px; }
  .card-title { font-size: 16px; font-weight: 700; margin-top: 3px; }
  .card-desc { font-size: 12px; color: #555; margin-top: 2px; }
  .card-img { padding: 8px; display: flex; justify-content: center; background: #0a0a0f; }
  .card-img img { max-width: 100%; max-height: 380px; border-radius: 4px; }
  .concept { margin: 30px auto 0; max-width: 700px; padding: 16px 20px; background: #111119; border-radius: 10px; border: 1px solid #1e1e28; }
  .concept h3 { font-size: 13px; color: #4b5563; margin-bottom: 8px; }
  .concept p { font-size: 13px; color: #777; line-height: 1.7; }
  .concept span { color: #60a5fa; }
</style>
</head>
<body>
<h1>VBOX · O 融合 B 和 X</h1>
<p class="sub">O 不再是独立字母，而是融入 B 与 X 之间</p>

<div class="grid">
  <div class="card">
    <div class="card-header">
      <div class="card-num">方案 1</div>
      <div class="card-title">O 融 B 嵌 X</div>
      <div class="card-desc">O 的右侧弧融入 B 的下弧，左侧弧融入 X 的交叉笔画，三角嵌入交点</div>
    </div>
    <div class="card-img">
      <img src="Avant_garde_logo__VBOX__where__2026-06-13T10-28-17.png" alt="方案1">
    </div>
  </div>
  <div class="card">
    <div class="card-header">
      <div class="card-num">方案 2</div>
      <div class="card-title">O-X 联合体</div>
      <div class="card-desc">O 环包裹 X 的斜线形成统一集群，三角在 O-X 交汇中心</div>
    </div>
    <div class="card-img">
      <img src="Bold_creative_logo___V_B__O_X__2026-06-13T10-28-44.png" alt="方案2">
    </div>
  </div>
</div>

<div class="concept">
  <h3>设计思路</h3>
  <p>
    <span>方案 1：</span>O 环右弧 → 延伸融入 B 的下半弧廓；O 环左弧 → 穿插融入 X 的交叉笔画。播放三角置于 B-O-X 三字交汇点，V 单独挺立。<br><br>
    <span>方案 2：</span>O 作为环包裹 X 的对角线，形成 O-X 一体化符号，再与 B 的弧廓咬合。三角居于 O-X 融合体的正中心。
  </p>
</div>

</body>
</html>
